<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Hedgehog</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast-container"></div>
    <div class="container fade-in">
        <div class="glass-card">
            <span class="brand-text">Authentication</span>
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access your secure profile.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="identifier">Username or Email</label>
                    <input type="text" id="identifier" placeholder="Enter your identifier" required>
                </div>
                <div class="form-group">
                    <label for="password">Security Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary">
                    <span>Unlock Account</span>
                </button>
                
                <p class="form-footer">New member? <a href="register.html">Apply for access</a></p>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
